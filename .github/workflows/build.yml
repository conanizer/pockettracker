name: Build

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Accept SDK licenses
        run: yes | sdkmanager --licenses || true

      - name: Install SDK platform, NDK and CMake
        run: |
          sdkmanager \
            "platforms;android-36" \
            "ndk;27.0.12077973" \
            "cmake;3.22.1"

      - name: Cache Gradle
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: gradle-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}
          restore-keys: gradle-

      - name: Build debug APK
        run: ./gradlew assembleDebug --no-daemon

      # ─── SDL2 must be IN the APK, not merely in the build (convergence plan C1) ────────────────
      #
      # `assembleDebug` going green proves the NDK COMPILED the vendored SDL2. It proves nothing
      # about the artifact, and every one of the three things below is decided somewhere else:
      # whether a .so exists at all is SDL_SHARED, whether it is packaged is AGP, and whether the
      # Java half reaches the DEX is one sourceSet line in app/build.gradle.kts that NOTHING in the
      # app references until phase C3 — so a refactor could delete it and no compiler would say a
      # word. The failure would surface as an inscrutable crash the first time an SDLActivity boots.
      #
      # So the check is on the ARTIFACT, and it names literals only a correct build produces.
      - name: Assert the APK carries SDL2 (convergence C1)
        run: |
          # ⚠️ EVERY check fails EXPLICITLY. An earlier draft of this step relied on `set -e` plus
          # bare `test` lines, and when the llvm-nm lookup silently produced nothing it printed
          # "ALL CHECKS PASSED" over a symbol count of ZERO. A step whose pass is the absence of an
          # error cannot tell a working build from a broken instrument — so nothing here reports a
          # verdict it did not measure, and the evidence is printed either way.
          FAIL=0
          APK=$(ls app/build/outputs/apk/debug/*.apk)
          echo "APK: $APK"

          # (1) the native library, per ABI.
          for ABI in arm64-v8a x86_64; do
            if unzip -l "$APK" | grep -q "lib/$ABI/libSDL2.so"; then
              echo "ok    lib/$ABI/libSDL2.so"
            else
              echo "FAIL  lib/$ABI/libSDL2.so is not in the APK"; FAIL=1
            fi
          done

          # (2) the JNI entry point SDLActivity's static initialiser calls to compare its own
          # hardcoded version triple against the C library's, refusing to start on a mismatch.
          # ⚠️ Read out of the DYNAMIC SYMBOL TABLE, not grepped out of the file: the symbol name
          # also appears in debug info, so a plain `grep libSDL2.so` passes on a library that
          # exports nothing at all.
          NM=$(find "$ANDROID_SDK_ROOT/ndk" -type f -name llvm-nm | head -1)
          if [ -z "$NM" ] || [ ! -x "$NM" ]; then
            echo "FAIL  llvm-nm not found under $ANDROID_SDK_ROOT/ndk - the symbol check cannot run"
            FAIL=1
          else
            unzip -p "$APK" lib/arm64-v8a/libSDL2.so > /tmp/libSDL2.so
            "$NM" -D --defined-only /tmp/libSDL2.so | grep ' T Java_org_libsdl_app_' > /tmp/sdl-jni.txt || true
            COUNT=$(wc -l < /tmp/sdl-jni.txt)
            if grep -q ' T Java_org_libsdl_app_SDLActivity_nativeGetVersion$' /tmp/sdl-jni.txt; then
              echo "ok    nativeGetVersion exported, with $COUNT org.libsdl.app JNI entry points"
            else
              echo "FAIL  nativeGetVersion is not an exported symbol (found $COUNT entry points)"
              FAIL=1
            fi
            [ "$COUNT" -ge 40 ] || { echo "FAIL  only $COUNT JNI entry points exported, expected >= 40"; FAIL=1; }
          fi

          # (3) the Java half, in the DEX.
          FOUND=0
          for D in $(unzip -l "$APK" | grep -o 'classes[0-9]*\.dex'); do
            if unzip -p "$APK" "$D" | grep -aq 'org/libsdl/app/SDLActivity'; then
              echo "ok    org/libsdl/app/SDLActivity in $D"; FOUND=1
            fi
          done
          [ "$FOUND" -eq 1 ] || { echo "FAIL  org/libsdl/app/SDLActivity is in no classes*.dex"; FAIL=1; }

          exit $FAIL

      - name: Run unit tests
        run: ./gradlew test --no-daemon

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: pockettracker-debug
          path: app/build/outputs/apk/debug/*.apk
          retention-days: 7

  # The C++ half of the songcore conformance suite. The `build` job above already runs the JVM
  # goldens (./gradlew test), which proves the KOTLIN sequencer still matches them — this proves
  # the C++ one does, by comparing tools/pt{roundtrip,resolve,play,voice,render} against the same
  # committed goldens in /testdata. No Android SDK and no Gradle.
  #
  # Since S6b it also BUILDS THE ENGINE. Four of the five tools are header-only consumers of
  # native/songcore, but ptrender renders real audio through the real thing, so this job compiles
  # native/ — the engine plus the vendored opus/ogg/opusfile stack, which dominates the time. That
  # is a feature, not a cost: the engine had only ever been compiled by the NDK's clang (for the
  # APK) and by MSVC (on the dev box). gcc and host clang building it here is the first standing
  # proof that the Linux port's foundation actually compiles off Android.
  songcore:
    name: songcore conformance
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ ubuntu-latest, windows-latest, macos-latest ]

    steps:
      - uses: actions/checkout@v4

      - name: Build the engine + the conformance tools
        run: |
          cmake -S tools -B tools/build -DCMAKE_BUILD_TYPE=Release
          cmake --build tools/build --config Release

      # The three runners are the test, not redundancy. songcore's floats are compared as raw
      # binary32 BITS (event-schema §5), and the only reason that holds across languages and
      # machines is -ffp-contract=off / -fno-fast-math. gcc/x86-64, MSVC/x86-64 and clang/arm64
      # agreeing here is what makes that guarantee real — and arm64 is the architecture the app
      # actually ships on, so a divergence surfaces in CI instead of in the Linux port.
      #
      # ptrender (s6-render) is the one test that is NOT a byte-compare across these runners, and
      # cannot be: its DSP uses transcendentals and is built with -ffast-math on arm. It asserts
      # determinism (the same binary, twice), health, and an energy fingerprint with a 1 dB
      # tolerance. tools/ptrender/README.md explains why that is the strongest honest claim.
      - name: Compare the C++ port against the Kotlin goldens
        run: ctest --test-dir tools/build --output-on-failure -C Release

      # The rendered WAVs, so a fingerprint failure on a runner you cannot reach can be listened to.
      - name: Upload the rendered audio
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: ptrender-${{ matrix.os }}
          path: tools/build/render-out/*.wav
          retention-days: 7
          if-no-files-found: ignore

  # ─── The SDL shell (convergence plan A4) ────────────────────────────────────────────────────────
  #
  # Until this job existed, CI built the APK and the conformance tools and NO SHELL AT ALL, for any
  # platform — every desktop and PortMaster artifact to date was hand-built on one Linux box. That is
  # not a hypothetical gap: the first Windows configure attempted after the convergence plan was
  # written failed outright, because the audio profiler in sdl-audio-engine.cpp used POSIX
  # clock_gettime, which MSVC does not have. It had been broken for as long as it had existed and
  # nothing was watching.
  #
  # The two runners also cover BOTH branches of shell/CMakeLists.txt's SDL2 lookup, which is worth
  # more than doubling the platform count: ubuntu apt-installs libsdl2-dev, so find_package(SDL2)
  # succeeds and the link is against the SYSTEM SDL — the model every PortMaster CFW requires. Windows
  # has no system SDL, so it falls through to FetchContent and builds SDL from source, which is the
  # model the desktop package (A3) ships. Neither path can rot unnoticed now.
  shell:
    name: SDL shell (${{ matrix.name }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - { os: ubuntu-latest,  name: linux-x64 }
          - { os: windows-latest, name: windows-x64 }

    steps:
      - uses: actions/checkout@v4

      # System SDL2 on Linux only — see the job comment. Windows deliberately gets none, so that
      # runner exercises the FetchContent fallback.
      - name: Install SDL2 (Linux)
        if: runner.os == 'Linux'
        run: sudo apt-get update && sudo apt-get install -y libsdl2-dev

      # CMAKE_BUILD_TYPE explicitly, per shell/CMakeLists.txt's own warning: a Debug engine may not
      # keep up with a real-time audio callback, and the usual "default it if empty" guard does not
      # fire on MSVC.
      - name: Configure
        run: cmake -S shell -B shell/build -DCMAKE_BUILD_TYPE=Release

      - name: Build
        run: cmake --build shell/build --config Release

      # `error` rather than `warn` on no match — a shell that silently stopped being produced is
      # exactly the failure this job exists to catch, and a green job with an empty artifact would
      # hide it.
      - name: Upload the shell (Linux)
        if: runner.os == 'Linux'
        uses: actions/upload-artifact@v4
        with:
          name: pockettracker-shell-${{ matrix.name }}
          path: shell/build/pockettracker-sdl
          if-no-files-found: error
          retention-days: 7

      # ─── The double-clickable Windows package (convergence plan A3) ──────────────────────────────
      #
      # Windows uploads the ZIP rather than the bare exe, because the zip is the artifact that is
      # meant to reach a person: exe renamed to PocketTracker.exe, README, and the licences that a
      # statically linked SDL2 + decoder stack obliges us to ship.
      #
      # The script verifies the ARTIFACT before it zips — that the VC runtime is static (a stranger
      # has no redistributable installed), that the icon in the binary is ours, that the version
      # matches app/build.gradle.kts, and that every statically linked component has a notice — and
      # then reads the whole package back out of the zip. It handles both build layouts itself
      # (ninja puts the exe in the build root, a multi-config VS generator in Release/).
      #
      # ⚠️ `powershell` explicitly, NOT the runner's default shell. It is Windows PowerShell 5.1 the
      # script was written and tested against; pwsh 7 cannot load some of the assemblies it uses, and
      # a package step that only fails on the runner is the exact failure mode this job exists for.
      - name: Package the Windows desktop zip
        if: runner.os == 'Windows'
        shell: powershell
        run: powershell -ExecutionPolicy Bypass -File shell/build-windows.ps1

      - name: Upload the Windows package
        if: runner.os == 'Windows'
        uses: actions/upload-artifact@v4
        with:
          name: pockettracker-windows-x64
          path: build/windows/*.zip
          if-no-files-found: error
          retention-days: 7

  # ─── The pt-ui NDK canary (convergence plan A5) ─────────────────────────────────────────────────
  #
  # pt-ui — the ~18,000-line portable UI — is gated `if(NOT ANDROID)` in native/CMakeLists.txt, so
  # until this job it had never been compiled by the NDK's clang against Android's libc++ by anything,
  # ever. Convergence phase C2 is the deletion of that gate. This job is what makes C2 the un-gating of
  # a target already known to compile, instead of the day a pile of platform breakage is discovered.
  #
  # The artifact is thrown away on purpose: this is a COMPILE check, and pt-ui is a static archive, so
  # nothing here links. arm64-v8a and android-26 match the shipping ABI and minSdk in app/build.gradle.
  #
  # PT_UI_ON_ANDROID also drops the Oboe/JNI shell from the engine target, because this configures
  # native/ standalone — outside Gradle there is no Prefab and find_package(oboe) would have nothing to
  # find. The APK build never sets the option and is bit-for-bit unaffected.
  ndk-canary:
    name: pt-ui NDK canary
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Accept SDK licenses
        run: yes | sdkmanager --licenses || true

      - name: Install the NDK
        run: sdkmanager "ndk;27.0.12077973"

      - name: Compile pt-ui with the NDK toolchain
        run: |
          NDK="$ANDROID_SDK_ROOT/ndk/27.0.12077973"
          cmake -S native -B build-ndk-canary \
            -DCMAKE_TOOLCHAIN_FILE="$NDK/build/cmake/android.toolchain.cmake" \
            -DANDROID_ABI=arm64-v8a \
            -DANDROID_PLATFORM=android-26 \
            -DANDROID_STL=c++_shared \
            -DPT_UI_ON_ANDROID=ON \
            -DCMAKE_BUILD_TYPE=Release
          cmake --build build-ndk-canary --target pt-ui
