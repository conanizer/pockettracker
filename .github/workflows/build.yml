name: Build

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Accept SDK licenses
        run: yes | sdkmanager --licenses || true

      - name: Install SDK platform, NDK and CMake
        run: |
          sdkmanager \
            "platforms;android-36" \
            "ndk;27.0.12077973" \
            "cmake;3.22.1"

      - name: Cache Gradle
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: gradle-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}
          restore-keys: gradle-

      - name: Build debug APK
        run: ./gradlew assembleDebug --no-daemon

      - name: Run unit tests
        run: ./gradlew test --no-daemon

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: pockettracker-debug
          path: app/build/outputs/apk/debug/*.apk
          retention-days: 7

  # The C++ half of the songcore conformance suite. The `build` job above already runs the JVM
  # goldens (./gradlew test), which proves the KOTLIN sequencer still matches them — this proves
  # the C++ one does, by byte-comparing tools/pt{roundtrip,resolve,play,voice} against the same
  # committed goldens in /testdata. No Android SDK, no Gradle, no engine: the tools are header-only
  # consumers of native/songcore, so this is a ~1-minute gate that runs beside the APK build.
  songcore:
    name: songcore conformance
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ ubuntu-latest, windows-latest, macos-latest ]

    steps:
      - uses: actions/checkout@v4

      - name: Build the conformance tools
        run: |
          cmake -S tools -B tools/build -DCMAKE_BUILD_TYPE=Release
          cmake --build tools/build --config Release

      # The three runners are the test, not redundancy. songcore's floats are compared as raw
      # binary32 BITS (event-schema §5), and the only reason that holds across languages and
      # machines is -ffp-contract=off / -fno-fast-math. gcc/x86-64, MSVC/x86-64 and clang/arm64
      # agreeing here is what makes that guarantee real — and arm64 is the architecture the app
      # actually ships on, so a divergence surfaces in CI instead of in the Linux port.
      - name: Byte-compare the C++ port against the Kotlin goldens
        run: ctest --test-dir tools/build --output-on-failure -C Release
